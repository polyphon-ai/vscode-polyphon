version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      polyphon-sdk:
        patterns:
          - "@polyphon-ai/*"
      typescript-toolchain:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
      vscode:
        patterns:
          - "@types/vscode"
          - "@types/vscode-webview"
          - "@vscode/vsce"
      testing:
        patterns:
          - "vitest"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
