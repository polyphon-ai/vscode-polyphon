name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What are you trying to do that you can't do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Sidebar / chat panel
        - Code context attachment
        - Session / composition management
        - Connection / authentication
        - Commands
        - Settings
        - Performance
        - Other
    validations:
      required: true
